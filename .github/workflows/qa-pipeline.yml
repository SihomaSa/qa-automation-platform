name: QA Automation Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: true
        default: 'all'
        type: choice
        options: [all, e2e, api, smoke]

env:
  NODE_VERSION: '22'

# Required for GitHub Pages deployment
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run type-check
      - run: npm run lint

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Run API tests
        run: npm run test:api
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://automationexercise.com/api' }}
      - name: Upload API test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: |
            reports/
            allure-results/
          retention-days: 14
          if-no-files-found: warn

  e2e-tests:
    name: E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          BROWSER: ${{ matrix.browser }}
          HEADLESS: 'true'
          BASE_URL: ${{ vars.BASE_URL || 'https://automationexercise.com' }}
          SCREENSHOT_ON_FAIL: 'true'
          VIDEO_ON_FAIL: 'false'
      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ matrix.browser }}
          path: |
            reports/
            allure-results/
          retention-days: 14
          if-no-files-found: warn

  allure-report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs: [api-tests, e2e-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results
        continue-on-error: true
      - name: Merge allure results
        run: |
          mkdir -p allure-results all-results
          find all-results -name "*.json" -path "*/allure-results/*" -exec cp {} allure-results/ \; || true
          if [ -z "$(ls -A allure-results)" ]; then
            echo '{"uuid":"placeholder","name":"No results","status":"skipped","stage":"finished"}' \
              > allure-results/placeholder-result.json
          fi
      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_report: allure-report
          gh_pages: gh-pages
          allure_history: allure-history
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          force_orphan: true

  notify:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [api-tests, e2e-tests]
    # Only run if SLACK_WEBHOOK_URL secret is configured
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Notify on failure
        if: contains(needs.*.result, 'failure')
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ QA Pipeline failed on `${{ github.ref_name }}` — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
